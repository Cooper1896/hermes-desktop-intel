name: Build macOS x64 Desktop

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional upstream tag/commit to pin before build"
        required: false
        default: ""

concurrency:
  group: build-mac-x64-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-x64:
    name: Hermes Desktop mac-x64
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Optional pin upstream
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.upstream_ref != '' }}
        run: ./scripts/pin-upstream.sh "${{ inputs.upstream_ref }}"

      - name: Ensure submodule
        run: |
          if [[ ! -f upstream/package.json ]]; then
            git submodule update --init --recursive
          fi
          test -f upstream/apps/desktop/package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: upstream/package-lock.json

      - name: Electron mirror (optional)
        if: ${{ vars.ELECTRON_MIRROR != '' }}
        run: echo "ELECTRON_MIRROR=${{ vars.ELECTRON_MIRROR }}" >> "$GITHUB_ENV"

      - name: Setup deps check
        run: ./scripts/setup-deps.sh

      - name: Build Desktop mac-x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ./scripts/build-desktop-mac-x64.sh

      - name: Verify x64 artifacts
        run: ./scripts/verify-mac-x64.sh

      - name: Ad-hoc sign
        run: ./scripts/sign-adhoc.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hermes-desktop-mac-x64
          path: |
            dist/Hermes-*-mac-x64.dmg
            dist/Hermes-*-mac-x64.zip
            dist/SHA256SUMS
            dist/build-info.txt
          if-no-files-found: warn
          retention-days: 14
